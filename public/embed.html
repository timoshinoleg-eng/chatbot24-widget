<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBot24 Widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #widget-root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="widget-root"></div>
  <script>
    // Конфигурация из родительского окна
    const config = window.parent !== window ? {
      primaryColor: new URLSearchParams(location.search).get('color') || '#0d9488',
      greeting: decodeURIComponent(new URLSearchParams(location.search).get('greeting') || 'Добрый день! Чем могу помочь?'),
      position: new URLSearchParams(location.search).get('position') || 'bottom-right'
    } : {};

    // Передаём события в родительское окно
    window.addEventListener('message', (e) => {
      if (e.data.type === 'CHATBOT24_CONFIG') {
        window.widgetConfig = e.data.config;
      }
    });
  </script>
</body>
</html>
